<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Baixar Meu Jogo</title>

<style>

body{
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    padding:50px;
}

h1{
    font-size:50px;
}

p{
    font-size:20px;
}

.botao{
    display:inline-block;
    margin:20px;
    padding:20px 40px;
    font-size:25px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:15px;
    transition:0.3s;
}

.botao:hover{
    background:#333;
    transform:scale(1.1);
}

.caixa{
    background:rgba(0,0,0,0.3);
    padding:40px;
    border-radius:20px;
    display:inline-block;
}

</style>
</head>

<body>

<div class="caixa">

<h1>🎮 Meu Jogo</h1>

<p>Baixe agora o jogo!</p>

</a>

</div>

</body>
</html>
